[package]
name = "courier"
description.workspace = true
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
doc = false

[features]
default = []
# --- AUTOGEN:FEATURES START ---
# Generated by build/build_tool.py -- DO NOT EDIT
builtin_echo = ["builtin/builtin_echo", "waybill/builtin_echo"]
test_boot = ["builtin/test_boot", "waybill/test_boot"]
# --- AUTOGEN:FEATURES END ---

[dependencies]
tokio = { workspace = true, features = ["rt-multi-thread"] }

# courier_core
depot = { path = "../courier_core/depot" }
logger = { path = "../courier_core/logger" }
network = { path = "../courier_core/network" }
relay = { path = "../courier_core/relay" }
protocol = { path = "../courier_core/protocol" }

# waybill
waybill = { path = "../waybill" }

# builtin
builtin = { path = "../builtin" }
